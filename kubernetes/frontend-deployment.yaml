apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: puzzle-book-management-system-frontend:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5173